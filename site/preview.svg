<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">RISC-V SoC presentation site preview</title>
  <desc id="desc">A dashboard-style preview of the interactive SoC presentation site.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071018"/>
      <stop offset="0.48" stop-color="#0b1724"/>
      <stop offset="1" stop-color="#081018"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#142438"/>
      <stop offset="1" stop-color="#0e1926"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#35d6d0"/>
      <stop offset="1" stop-color="#90e36f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="190" cy="80" r="250" fill="#35d6d0" opacity="0.12"/>
  <circle cx="1080" cy="120" r="230" fill="#90e36f" opacity="0.10"/>

  <g filter="url(#shadow)">
    <rect x="56" y="46" width="1168" height="628" rx="18" fill="url(#panel)" stroke="#334155" stroke-width="1.2"/>
    <rect x="56" y="46" width="1168" height="54" rx="18" fill="#081018" opacity="0.88"/>
    <rect x="56" y="82" width="1168" height="18" fill="#081018" opacity="0.88"/>
    <circle cx="88" cy="73" r="7" fill="#ef6666"/>
    <circle cx="111" cy="73" r="7" fill="#f2c85c"/>
    <circle cx="134" cy="73" r="7" fill="#6bd26b"/>
    <text x="640" y="78" fill="#9fb0c4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">RISC-V SoC Sunum Sitesi</text>
  </g>

  <g transform="translate(92 134)">
    <text x="0" y="0" fill="#35d6d0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">RISC-V SoC Demonstrator</text>
    <text x="0" y="46" fill="#f5f7fb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="800">Mimari, fiziksel tasarım</text>
    <text x="0" y="92" fill="#f5f7fb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="800">ve performans özeti</text>
    <text x="0" y="134" fill="#9fb0c4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">CV32E40P tabanlı SoC, AI hızlandırıcı adası,</text>
    <text x="0" y="164" fill="#9fb0c4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">LibreLane/KLayout serim verisi ve benchmark kanıtları.</text>

    <rect x="0" y="208" width="176" height="44" rx="8" fill="url(#accent)"/>
    <text x="88" y="236" fill="#061018" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" text-anchor="middle">Sunumu Aç</text>
    <rect x="192" y="208" width="196" height="44" rx="8" fill="#101b27" stroke="#3a4a5e"/>
    <text x="290" y="236" fill="#f5f7fb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Serim İncelemesi</text>
  </g>

  <g transform="translate(690 128)">
    <rect x="0" y="0" width="450" height="292" rx="18" fill="#0b1420" stroke="#2dd4bf" stroke-opacity="0.45"/>
    <g transform="translate(76 40)">
      <path d="M150 0 L300 72 L150 144 L0 72 Z" fill="#142438" stroke="#35d6d0" stroke-width="2"/>
      <path d="M0 72 L150 144 L150 206 L0 132 Z" fill="#0d1c2c" stroke="#35d6d0" stroke-opacity="0.45"/>
      <path d="M300 72 L150 144 L150 206 L300 132 Z" fill="#102236" stroke="#90e36f" stroke-opacity="0.35"/>
      <path d="M150 0 L300 72 L300 132 L150 206 L0 132 L0 72 Z" fill="none" stroke="#5eead4" stroke-opacity="0.35"/>
      <rect x="85" y="58" width="128" height="48" rx="8" fill="#1d3550" stroke="#35d6d0"/>
      <text x="149" y="88" fill="#f5f7fb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" text-anchor="middle">CV32E40P</text>
      <rect x="52" y="118" width="92" height="38" rx="7" fill="#173b44" stroke="#35d6d0" opacity="0.92"/>
      <text x="98" y="142" fill="#dffdfa" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Memory</text>
      <rect x="156" y="118" width="92" height="38" rx="7" fill="#263d25" stroke="#90e36f" opacity="0.92"/>
      <text x="202" y="142" fill="#efffe8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">AI Unit</text>
    </g>
  </g>

  <g transform="translate(92 468)">
    <rect x="0" y="0" width="252" height="118" rx="14" fill="#101b27" stroke="#334155"/>
    <text x="24" y="34" fill="#9fb0c4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Vivado SAIF güç raporu</text>
    <text x="24" y="76" fill="#f5f7fb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Yüksek güven</text>
  </g>
  <g transform="translate(372 468)">
    <rect x="0" y="0" width="214" height="118" rx="14" fill="#101b27" stroke="#334155"/>
    <text x="24" y="34" fill="#9fb0c4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Toplam güç</text>
    <text x="24" y="76" fill="#f5f7fb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">0.123 W</text>
  </g>
  <g transform="translate(614 468)">
    <rect x="0" y="0" width="244" height="118" rx="14" fill="#101b27" stroke="#334155"/>
    <text x="24" y="34" fill="#9fb0c4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">LibreLane alan</text>
    <text x="24" y="76" fill="#f5f7fb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">1.210 mm²</text>
  </g>
  <g transform="translate(886 468)">
    <rect x="0" y="0" width="254" height="118" rx="14" fill="#101b27" stroke="#334155"/>
    <text x="24" y="34" fill="#9fb0c4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">LVS doğrulama</text>
    <text x="24" y="76" fill="#90e36f" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Passed</text>
  </g>

  <g transform="translate(690 446)">
    <polyline points="0,0 62,-28 126,-12 190,-58 254,-34 318,-92 382,-68" fill="none" stroke="#35d6d0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <polyline points="0,42 62,20 126,34 190,0 254,18 318,-20 382,6" fill="none" stroke="#90e36f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.72"/>
  </g>
</svg>
